<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkMe CRM - Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="tasks">
  <aside class="app-sidebar">
    <a class="brand" href="index.html"><span>LinkMe</span><small>CRM</small></a>
    <nav class="sidebar-nav">
      <a href="index.html" data-icon="layout-dashboard">Dashboard</a>
      <a href="customers.html" data-icon="users">Customers</a>
      <a href="leads.html" data-icon="chart-no-axes-combined">Leads</a>
      <a class="active" href="tasks.html" data-icon="list-checks">Tasks</a>
      <a href="reports.html" data-icon="bar-chart-3">Reports</a>
    </nav>
  </aside>
  <main class="app-main">
    <header class="topbar">
      <button class="icon-btn d-lg-none" type="button" data-sidebar-toggle aria-label="Open menu"><i data-lucide="menu"></i></button>
      <div><p class="eyebrow">Follow-ups</p><h1>Tasks</h1></div>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal"><i data-lucide="plus"></i>Add</button>
    </header>
    <section class="content-shell">
      <div class="toolbar segmented">
        <button class="active" data-task-filter="all">All</button>
        <button data-task-filter="open">Open</button>
        <button data-task-filter="done">Done</button>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <form class="modal-content" id="taskForm">
        <div class="modal-header"><h2 class="modal-title">Task</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
        <div class="modal-body form-grid">
          <label class="span-2">Title<input class="form-control" id="taskTitle" required></label>
          <label>Customer<select class="form-select" id="taskCustomer"></select></label>
          <label>Due date<input class="form-control" id="taskDue" type="date" required></label>
          <label class="span-2">Notes<textarea class="form-control" id="taskNotes" rows="3"></textarea></label>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
      </form>
    </div>
  </div>
  <nav class="mobile-nav">
    <a href="index.html"><i data-lucide="home"></i><span>Home</span></a>
    <a href="customers.html"><i data-lucide="users"></i><span>Customers</span></a>
    <a href="leads.html"><i data-lucide="chart-no-axes-combined"></i><span>Leads</span></a>
    <a class="active" href="tasks.html"><i data-lucide="check"></i><span>Tasks</span></a>
    <a href="settings.html"><i data-lucide="user-round"></i><span>Profile</span></a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
