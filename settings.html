<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkMe CRM - Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="settings">
  <aside class="app-sidebar">
    <a class="brand" href="index.html"><span>LinkMe</span><small>CRM</small></a>
    <nav class="sidebar-nav">
      <a href="index.html" data-icon="layout-dashboard">Dashboard</a>
      <a href="customers.html" data-icon="users">Customers</a>
      <a href="leads.html" data-icon="chart-no-axes-combined">Leads</a>
      <a href="tasks.html" data-icon="list-checks">Tasks</a>
      <a href="reports.html" data-icon="bar-chart-3">Reports</a>
      <a class="active" href="settings.html" data-icon="settings">Settings</a>
    </nav>
  </aside>
  <main class="app-main">
    <header class="topbar">
      <button class="icon-btn d-lg-none" type="button" data-sidebar-toggle aria-label="Open menu"><i data-lucide="menu"></i></button>
      <div><p class="eyebrow">Workspace</p><h1>Settings</h1></div>
      <button class="btn btn-primary" id="saveSettings"><i data-lucide="save"></i>Save</button>
    </header>
    <section class="content-shell settings-grid">
      <section class="panel">
        <div class="panel-header"><div><p class="eyebrow">Business</p><h2>Profile</h2></div></div>
        <div class="form-grid">
          <label>Business name<input class="form-control" value="Amina Styles"></label>
          <label>Industry<select class="form-select"><option>Retail</option><option>Salon</option><option>Consulting</option><option>Agency</option></select></label>
          <label>Phone<input class="form-control" value="+256 701 555 100"></label>
          <label>Currency<select class="form-select"><option>UGX</option><option>KES</option><option>TZS</option><option>RWF</option></select></label>
        </div>
      </section>
      <section class="panel">
        <div class="panel-header"><div><p class="eyebrow">Preferences</p><h2>Workflow</h2></div></div>
        <div class="settings-list">
          <label><span>WhatsApp quick actions</span><input class="form-check-input" type="checkbox" checked></label>
          <label><span>Daily follow-up reminder</span><input class="form-check-input" type="checkbox" checked></label>
          <label><span>Show revenue on dashboard</span><input class="form-check-input" type="checkbox" checked></label>
        </div>
      </section>
    </section>
  </main>
  <nav class="mobile-nav">
    <a href="index.html"><i data-lucide="home"></i><span>Home</span></a>
    <a href="customers.html"><i data-lucide="users"></i><span>Customers</span></a>
    <a href="leads.html"><i data-lucide="chart-no-axes-combined"></i><span>Leads</span></a>
    <a href="tasks.html"><i data-lucide="check"></i><span>Tasks</span></a>
    <a class="active" href="settings.html"><i data-lucide="user-round"></i><span>Profile</span></a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
