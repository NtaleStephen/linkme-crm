<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkMe CRM - Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="notes">
  <aside class="app-sidebar">
    <a class="brand" href="index.html"><span>LinkMe</span><small>CRM</small></a>
    <nav class="sidebar-nav"><a href="index.html" data-icon="layout-dashboard">Dashboard</a><a href="customers.html" data-icon="users">Customers</a><a href="leads.html" data-icon="chart-no-axes-combined">Leads</a><a href="tasks.html" data-icon="list-checks">Tasks</a><a href="reports.html" data-icon="bar-chart-3">Reports</a></nav>
    <p class="nav-label">Tools</p>
    <nav class="sidebar-nav"><a href="whatsapp.html" data-icon="message-circle">WhatsApp Center</a><a class="active" href="notes.html" data-icon="notebook-pen">Notes</a></nav>
  </aside>
  <main class="app-main">
    <header class="topbar">
      <button class="icon-btn d-lg-none" type="button" data-sidebar-toggle aria-label="Open menu"><i data-lucide="menu"></i></button>
      <div><p class="eyebrow">Workspace</p><h1>Notes</h1></div>
      <button class="btn btn-primary" id="saveNote"><i data-lucide="save"></i>Save</button>
    </header>
    <section class="content-shell">
      <section class="panel">
        <div class="panel-header"><div><p class="eyebrow">Scratchpad</p><h2>Business notes</h2></div></div>
        <textarea id="notesArea" class="notes-area" placeholder="Write notes from calls, shop visits, or customer requests"></textarea>
      </section>
    </section>
  </main>
  <nav class="mobile-nav">
    <a href="index.html"><i data-lucide="home"></i><span>Home</span></a>
    <a href="customers.html"><i data-lucide="users"></i><span>Customers</span></a>
    <a href="leads.html"><i data-lucide="chart-no-axes-combined"></i><span>Leads</span></a>
    <a href="tasks.html"><i data-lucide="check"></i><span>Tasks</span></a>
    <a href="settings.html"><i data-lucide="user-round"></i><span>Profile</span></a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
